name: Run POMWright Tests

on:
  push:
    branches:
      - "main"
  pull_request:
    types:
      - opened # Triggers for new PRs and draft PRs
      - reopened # Triggers for reopened PRs and draft PRs
      - synchronize # Triggers on new commits to PRs and draft PRs
    branches:
      - "**" # Triggers for PRs and draft PRs targeting any branch

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.12.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Generate Playwright Report Name
        if: always()
        shell: bash
        run: |
          # Determine branch name: use github.head_ref for PRs, fallback to github.ref_name for pushes
          branchName="${{ github.head_ref || github.ref_name }}"
          # Replace any character that isn't a letter, number, or hyphen with '-'
          normalizedBranchName="${branchName//[^a-zA-Z0-9æÆøØåÅ\-]/-}"
          timestamp=$(date +"%d_%m_%Y_%H%M")
          echo "PLAYWRIGHT_REPORT_NAME=playwright-report-$normalizedBranchName-$timestamp" >> $GITHUB_ENV

      - name: Run v1 test script
        id: test_v1
        continue-on-error: true
        run: pnpm pack-test
        env:
          CI: true

      - name: Upload Playwright V1 Test Report Artifact on failure
        if: steps.test_v1.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: V1_${{ env.PLAYWRIGHT_REPORT_NAME }}
          path: intTest/playwright-report
          retention-days: 30

      - name: Run v2 test script
        id: test_v2
        continue-on-error: true
        run: pnpm pack-test:v2
        env:
          CI: true

      - name: Upload Playwright V2 Test Report Artifact on failure
        if: steps.test_v2.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: V2_${{ env.PLAYWRIGHT_REPORT_NAME }}
          path: intTestV2/playwright-report
          retention-days: 30

      - name: Fail job if any suite failed
        if: always()
        shell: bash
        run: |
          echo "V1 outcome: ${{ steps.test_v1.outcome }}"
          echo "V2 outcome: ${{ steps.test_v2.outcome }}"
          if [ "${{ steps.test_v1.outcome }}" = "failure" ] || [ "${{ steps.test_v2.outcome }}" = "failure" ]; then
            exit 1
          fi
