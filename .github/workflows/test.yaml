name: Run POMWright Tests

on:
  push:
    branches:
      - "main"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.12.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Generate Playwright Report Name
        if: always()
        shell: bash
        run: |
          branchName="${{ github.head_ref || github.ref_name }}"
          normalizedBranchName="${branchName//[^a-zA-Z0-9æÆøØåÅ\-]/-}"
          timestamp=$(date +"%d_%m_%Y_%H%M")
          echo "PLAYWRIGHT_REPORT_NAME=playwright-report-$normalizedBranchName-$timestamp" >> $GITHUB_ENV

      - name: Run v2 test script
        id: test_v2
        continue-on-error: true
        run: pnpm pack-test:v2
        env:
          CI: true

      - name: Upload Playwright V2 Test Report Artifact on failure
        if: steps.test_v2.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: V2_${{ env.PLAYWRIGHT_REPORT_NAME }}
          path: intTestV2/playwright-report
          retention-days: 30

      - name: Fail job if suite failed
        if: always()
        shell: bash
        run: |
          echo "V2 outcome: ${{ steps.test_v2.outcome }}"
          if [ "${{ steps.test_v2.outcome }}" = "failure" ]; then
            exit 1
          fi
